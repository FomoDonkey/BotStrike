name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python engine sidecar
        run: python scripts/build_engine.py

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: v__VERSION__
          releaseName: "BotStrike v__VERSION__"
          releaseBody: |
            ## BotStrike Desktop v__VERSION__

            ### Installation
            - **Windows MSI**: `BotStrike___VERSION___x64_en-US.msi` (recommended)
            - **Windows NSIS**: `BotStrike___VERSION___x64-setup.exe`

            **Standalone**: Includes Python trading engine — no Python installation needed.

            ### Auto-Update
            Existing installations will automatically detect this update.

            ### Changes
            See commit history for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

  verify:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Verify release
        run: |
          echo "Release created successfully"
          echo "Auto-update JSON: https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
