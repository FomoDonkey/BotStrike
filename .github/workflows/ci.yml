name: CI

on:
  push:
    branches: [main]
    paths:
      - "*.py"
      - "core/**"
      - "strategies/**"
      - "risk/**"
      - "execution/**"
      - "portfolio/**"
      - "exchange/**"
      - "analytics/**"
      - "backtesting/**"
      - "trade_database/**"
      - "logging_metrics/**"
      - "notifications/**"
      - "config/**"
      - "tests/**"
      - "desktop/**"
      - "server/**"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: TypeScript check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Build
        working-directory: desktop
        run: npx vite build

  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Verify imports compile
        run: |
          python -c "from server.bridge import app; print('Bridge OK')"
          python -c "from strategies.mean_reversion import MeanReversionStrategy; print('MR OK')"
          python -c "from risk.risk_manager import RiskManager; print('Risk OK')"
          python -c "from execution.order_engine import OrderExecutionEngine; print('Execution OK')"

      - name: Run tests
        run: python -m pytest tests/ -x -q

  check-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Create sidecar placeholder for cargo check
        run: |
          mkdir -p desktop/src-tauri/binaries/engine
          echo "placeholder" > desktop/src-tauri/binaries/botstrike-engine-x86_64-pc-windows-msvc.exe
          echo "placeholder" > desktop/src-tauri/binaries/engine/botstrike-engine.exe

      - name: Cargo check (no full build)
        working-directory: desktop/src-tauri
        run: cargo check
