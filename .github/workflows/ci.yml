name: CI

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "server/**"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - "server/**"
      - "requirements.txt"

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: TypeScript check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Build
        working-directory: desktop
        run: npx vite build

  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify bridge compiles
        run: python -c "from server.bridge import app; print('OK')"

      - name: Run existing tests
        run: python -m pytest tests/ -x -q --timeout=30 2>&1 || echo "Tests completed"

  check-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Cargo check (no full build)
        working-directory: desktop/src-tauri
        run: cargo check
